{% extends "base.html" %}
{% block content %}
<div class="hero" style="padding: 2rem 0;">
    <h1>📋 Conversion History</h1>
    <table class="history-table">
        <thead>
            <tr>
                <th>🆔 ID</th>
                <th>📄 Filename</th>
                <th>📊 Status</th>
                <th>🕐 Date</th>
            </tr>
        </thead>
        <tbody>
            {% for conv in conversions %}
            <tr>
                <td>{{ conv.id }}</td>
                <td>{{ conv.original_filename }}</td>
                <td class="status-{{ conv.status }}">{{ conv.status }}</td>
                <td>{{ conv.created_at.strftime('%Y-%m-%d %H:%M') }}</td>
            </tr>
            {% else %}
            <tr>
                <td colspan="4" style="text-align: center; color: #888;">No conversions yet</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
